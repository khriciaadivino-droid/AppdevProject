# Railway: Node/Express API only (Dockerfile). Do not use NIXPACKS on this RN monorepo.
# Link the MySQL plugin and reference MYSQLHOST → MYSQL_HOST (see .env.example).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
